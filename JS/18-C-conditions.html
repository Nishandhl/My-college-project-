<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JS Boolean</h1>
    <h3>Use case : if...else</h3>

    <p id="demo"></p>
    <script>
        const hour = new Date().getHours();
        let greeting;
        if(hour<18){
            greeting="have a good day!";
        }else{
                greeting="good evening Nishan enjoy your Web Development Journey";
            }
            document.getElementById("demo").innerHTML=greeting;
        
    </script>
</body>
</html>
